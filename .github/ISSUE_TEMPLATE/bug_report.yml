name: Bug report
description: Something is broken.
labels: ["bug"]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened
      description: Describe the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: Minimal steps to reproduce.
    validations:
      required: true
  - type: textarea
    id: doctor
    attributes:
      label: Output of `eaw-sync doctor`
      render: shell
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: "`eaw-sync --version`"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS
      description: e.g. macOS 14.4, Ubuntu 22.04
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant log excerpt
      description: Redact any tokens.
      render: shell
