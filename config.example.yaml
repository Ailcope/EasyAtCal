easyatwork:
  # "user" = scrape the web SPA via Playwright (recommended — no public API).
  # "client" = OAuth client_credentials (only if a public API is ever published).
  auth_mode: user

  # ---------- user mode ----------
  email: "me@example.com"         # or set EAW_EMAIL
  
  # Password is NEVER stored on disk. Provide it via env var for `eaw-sync login`:
  #   EAW_PASSWORD=... eaw-sync login
  # or enter it interactively when prompted.
  
  login_url: "https://app.easyatwork.com/"
  app_url: "https://app.easyatwork.com"
  
  # Regional API host and IDs are now AUTOMATICALLY EXTRACTED during `eaw-sync login`.
  # You can leave these as null.
  api_url: null
  customer_id: null
  employee_id: null
  
  # Mimic the SPA version header. Bump if the API starts rejecting.
  ui_version: "2.313.0"
  
  # Browser is headless by default. Set false to watch the automated login visually.
  headless: true

sync:
  lookback_days: 7
  lookahead_days: 90
  user_id: null                   # null = self
  # Customize event titles (e.g. "[Work] {title} at {location}")
  event_title_format: "{title}"
  # Default alarm for shifts (e.g. 60 for 1 hour before)
  alarm_minutes_before: null

backend: ics                      # "eventkit" (macOS) or "ics" (All platforms)

backends:
  eventkit:
    calendar_name: "EasyAtWork"
    calendar_source: "iCloud"     # "iCloud" or "On My Mac"
  ics:
    output_path: "~/Documents/easyatwork-shifts.ics"

logging:
  level: INFO
  format: text                    # "text" or "json"
